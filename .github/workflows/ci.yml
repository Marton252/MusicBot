# ═══════════════════════════════════════════════════════════════════
# CI — Lint & Build Validation
# Runs on every push and pull request to catch issues early.
# ═══════════════════════════════════════════════════════════════════

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Secret Scanning ────────────────────────────────────────
  secrets:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # ─── Python Bot ───────────────────────────────────────────────
  python:
    name: Python Lint & Import Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (compile all .py files)
        run: python -m py_compile bot.py config.py generate_cert.py && python -m compileall cogs/ services/ -q

  # ─── React Dashboard ─────────────────────────────────────────
  dashboard:
    name: Dashboard Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dash-ui

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dash-ui/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # ─── Docker Build (dry run) ──────────────────────────────────
  docker:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [secrets, python, dashboard]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: musicbot:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
