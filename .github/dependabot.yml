# ═══════════════════════════════════════════════════════════════════
# Dependabot — Automated dependency version updates
# Groups updates into single PRs to reduce noise.
# ═══════════════════════════════════════════════════════════════════

version: 2
updates:
  # ─── Python (pip) ──────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      pip-all:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  # ─── Node.js (npm) — Dashboard ────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/dash-ui"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      npm-all:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"

  # ─── GitHub Actions ────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions-all:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci)"

  # ─── Docker ────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "chore(docker)"
