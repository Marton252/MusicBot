# ═══════════════════════════════════════════════════════════════════
# Discord Music Bot — Docker Compose (Example)
#
# Quick start:
#   1. Copy .env.example to .env and fill in your values
#   2. Rename this file to docker-compose.yml  (or use -f flag)
#   3. docker compose up -d
# ═══════════════════════════════════════════════════════════════════

services:
  bot:
    image: ghcr.io/marton252/musicbot:latest
    container_name: discord-musicbot
    restart: unless-stopped
    depends_on:
      - lavalink

    # All config comes from .env — no overrides needed.
    # Defaults: DASHBOARD_BIND=0.0.0.0, MUSIC_BACKEND=lavalink,
    # DATABASE_PATH=/app/data/database.db (in Docker)
    env_file:
      - .env

    environment:
      - TZ=${BOT_TIMEZONE:-UTC}

    ports:
      - "${DASHBOARD_PORT:-25825}:${DASHBOARD_PORT:-25825}"

    volumes:
      # Persist the SQLite database across container rebuilds
      - bot-data:/app/data

      # Optional: mount your own TLS certificates instead of the auto-generated ones
      # - ./certs:/app/certs:ro

      # Optional: mount a cookies.txt file for YouTube authentication
      # - ./cookies.txt:/app/cookies.txt:ro

  # Default audio backend. Keep the 2333 port internal to the compose network.
  # If you choose MUSIC_BACKEND=ffmpeg, you can remove or comment this service.
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4-alpine
    container_name: musicbot-lavalink
    restart: unless-stopped
    environment:
      - _JAVA_OPTIONS=-Xmx1G
    expose:
      - "2333"
    volumes:
      - ./lavalink/application.yml.example:/opt/Lavalink/application.yml:ro
      - lavalink-plugins:/opt/Lavalink/plugins

volumes:
  bot-data:
  lavalink-plugins:
