# ═══════════════════════════════════════════════════════════════════
# Discord Music Bot — Docker Compose (Example)
#
# Quick start:
#   1. Copy .env.example to .env and fill in your values
#   2. Rename this file to docker-compose.yml  (or use -f flag)
#   3. docker compose up -d
# ═══════════════════════════════════════════════════════════════════

services:
  bot:
    image: ghcr.io/marton252/musicbot:latest
    container_name: discord-musicbot
    restart: unless-stopped

    # Load all variables from your .env file
    env_file:
      - .env

    # Overrides that make sense inside Docker
    environment:
      # Bind to all interfaces so the dashboard is reachable from outside the container
      - DASHBOARD_BIND=0.0.0.0
      # Store the database in the persistent volume
      - DATABASE_PATH=/app/data/database.db
      # Sync container timezone with bot timezone (falls back to UTC)
      - TZ=${BOT_TIMEZONE:-UTC}

    ports:
      # Map dashboard port to the host
      # Change the left side if you want a different host port
      - "${DASHBOARD_PORT:-25825}:${DASHBOARD_PORT:-25825}"

    volumes:
      # Persist the SQLite database across container rebuilds
      - bot-data:/app/data

      # Optional: mount your own TLS certificates instead of the auto-generated ones
      # - ./certs:/app/certs:ro

      # Optional: mount a cookies.txt file for YouTube authentication
      # - ./cookies.txt:/app/cookies.txt:ro

volumes:
  bot-data:
