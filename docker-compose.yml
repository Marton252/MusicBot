services:
  bot:
    build: .
    container_name: discord-musicbot
    restart: unless-stopped

    env_file:
      - .env

    # Override bind address so the dashboard is reachable from outside the container
    environment:
      - DASHBOARD_BIND=0.0.0.0
      - DATABASE_PATH=/app/data/database.db
      - TZ=${BOT_TIMEZONE:-UTC}

    volumes:
      # Persist the SQLite database across container rebuilds
      - bot-data:/app/data

      # Optional: mount your own certs instead of the auto-generated ones
      # - ./certs:/app/certs:ro

      # Optional: mount a cookies.txt for YouTube auth
      # - ./cookies.txt:/app/cookies.txt:ro
    
    networks:
      - proxy_net

volumes:
  bot-data:

networks:
  proxy_net:
    external: true